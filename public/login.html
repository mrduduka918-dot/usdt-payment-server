<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:300px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#16a34a;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#15803d;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="location.href='/pay.html'">
Login
</button>

</div>

</body>
</html>
