<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

<h2>User Login</h2>

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<br>

Don't have an account?

<a href="/signup">
Create Account
</a>

</div>

</body>

</html>
