<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Signup</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<form action="/signup" method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Create Account
</button>

</form>

<br>

Already have an account?

<a href="/login">
Login
</a>

</div>

</body>

</html>
